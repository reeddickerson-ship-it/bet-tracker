<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

<title>David's Bet Tracker</title>
<style>
:root{
 --bg:#0f1115;--panel:#171a21;--panel2:#1e222b;--line:#2a2f3a;--ink:#f2f4f7;--muted:#9aa1ad;
 --take:#1d9e75;--watch:#d98a1f;--lean:#3d7fd4;--skip:#7a8089;
 --take-bg:#10241d;--watch-bg:#241b0d;--lean-bg:#0e1b2b;--skip-bg:#1b1e25;
 --win:#1d9e75;--loss:#e24b4a;--push:#7a8089;--fade:#8b6cff;--pass:#7a8089;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);
 font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
 font-size:16px;line-height:1.45;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:max(14px,env(safe-area-inset-top)) 14px calc(72px + env(safe-area-inset-bottom))}
header{padding:4px 0 12px;display:flex;align-items:center;gap:10px}
.av{width:32px;height:32px;border-radius:9px;background:var(--ink);color:var(--bg);
 display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
h1{font-size:18px;margin:0;font-weight:600;letter-spacing:-.01em}
.sub{font-size:12px;color:var(--muted)}
textarea{width:100%;min-height:120px;background:var(--panel);color:var(--ink);
 border:1px solid var(--line);border-radius:12px;padding:12px;font-size:16px;
 font-family:ui-monospace,'SF Mono',Menlo,monospace;line-height:1.5;resize:vertical}
textarea:focus{outline:none;border-color:#3a4150}
.row{display:flex;gap:8px;margin-top:10px}
button{font-family:inherit;cursor:pointer}
.btn{flex:1;background:var(--take);color:#04130d;border:none;border-radius:12px;
 padding:13px;font-size:15px;font-weight:650}
.btn:active{transform:scale(.99)}
.btn2{background:var(--panel2);color:var(--muted);border:1px solid var(--line);
 border-radius:12px;padding:13px 14px;font-size:14px;font-weight:500}
.summary{display:flex;gap:6px;margin:14px 0 4px;flex-wrap:wrap}
.pill{flex:1;min-width:64px;background:var(--panel);border:1px solid var(--line);
 border-radius:11px;padding:8px 5px;text-align:center}
.pill .num{font-size:20px;font-weight:650;line-height:1}
.pill .lab{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
.note{font-size:12px;color:var(--muted);text-align:center;margin:8px 0}
.note b{color:var(--ink);font-weight:600}
.cards{margin-top:12px;display:flex;flex-direction:column;gap:9px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px 12px;border-left-width:4px}
.card.take{border-left-color:var(--take)}.card.fade{border-left-color:#8b6cff}.card.watch{border-left-color:var(--watch)}
.card.lean{border-left-color:var(--lean)}.card.pass{border-left-color:var(--skip)}
.card.win{border-left-color:var(--win)}.card.loss{border-left-color:var(--loss)}.card.push{border-left-color:var(--push)}
.ch{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.sel{font-size:15px;font-weight:600;letter-spacing:-.01em}
.raw{font-size:11px;color:var(--muted);font-family:ui-monospace,monospace;margin-top:1px}
.badge{font-size:10.5px;font-weight:700;letter-spacing:.04em;padding:4px 8px;border-radius:7px;white-space:nowrap;flex-shrink:0}
.badge.take{color:#8fe6c8;background:var(--take-bg)}.badge.watch{color:#f0c178;background:var(--watch-bg)}
.badge.lean{color:#9cc4f2;background:var(--lean-bg)}.badge.skip{color:#aeb4bd;background:var(--skip-bg)}
.badge.win{color:#8fe6c8;background:var(--take-bg)}.badge.loss{color:#f0a0a0;background:#2a1414}.badge.push{color:#b8bdc6;background:var(--skip-bg)}
.meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;align-items:center}
.tag{font-size:11px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);
 border-radius:7px;padding:3px 7px;display:inline-flex;align-items:center;gap:4px}
.tag b{color:var(--ink);font-weight:600}
select.ov{font-size:12.5px;background:var(--panel2);color:var(--ink);border:1px solid #39404d;
 border-radius:7px;padding:3px 5px;font-family:inherit}
.uin{width:42px;background:#0f1115;color:var(--ink);border:1px solid #39404d;border-radius:6px;
 padding:3px 4px;font-size:13px;font-family:inherit;text-align:center;-moz-appearance:textfield}
.uin::-webkit-outer-spin-button,.uin::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.sidetog{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.sidetog button{background:var(--panel2);color:var(--muted);border:none;padding:5px 13px;font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer}
.sidetog button.on{background:var(--take);color:#04130d}
.sidetog button.on.f{background:#8b6cff;color:#0c0820}
.why{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.4}
.why b{color:#c8cdd6;font-weight:600}
.roin{font-variant-numeric:tabular-nums}.pos{color:#5fcfa6}.neg{color:#e88}
.grade-row{display:flex;gap:6px;margin-top:10px}
.gb{flex:1;border-radius:9px;padding:9px;font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--panel2);color:var(--muted)}
.gb.w.on{background:var(--win);color:#04130d;border-color:var(--win)}
.gb.l.on{background:var(--loss);color:#2a0a0a;border-color:var(--loss)}
.gb.p.on{background:var(--push);color:#0d0f12;border-color:var(--push)}
.del{font-size:11px;color:#7a8089;background:none;border:none;padding:6px 2px;margin-top:4px;text-decoration:underline}
.daterow{font-size:12px;color:var(--muted);font-weight:600;margin:14px 0 6px;text-transform:uppercase;letter-spacing:.05em}
.empty{color:var(--muted);font-size:13.5px;text-align:center;padding:20px;
 background:var(--panel);border:1px dashed var(--line);border-radius:12px;margin-top:12px}
table.tr{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
table.tr th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600;padding:7px 6px;border-bottom:1px solid var(--line)}
table.tr td{padding:8px 6px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
.nav{position:fixed;left:0;right:0;bottom:0;background:#10131a;border-top:1px solid var(--line);
 display:flex;padding:6px 8px calc(6px + env(safe-area-inset-bottom));gap:4px;z-index:10}
.nav button{flex:1;background:none;border:none;color:var(--muted);font-size:11px;font-weight:600;
 padding:7px 4px;border-radius:10px;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav button .ic{font-size:18px;line-height:1}
.nav button.on{color:var(--ink);background:var(--panel)}
.nav .badgeN{position:absolute;top:2px;right:50%;margin-right:-22px;background:var(--watch);color:#04130d;
 font-size:9px;font-weight:700;border-radius:8px;padding:0 5px;min-width:15px;text-align:center}
.view{display:none}.view.on{display:block}
.exrow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.exrow .btn2{flex:1;min-width:120px;text-align:center}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:84px;background:#222730;color:var(--ink);
 border:1px solid var(--line);border-radius:10px;padding:9px 15px;font-size:13px;opacity:0;transition:opacity .2s;z-index:20;pointer-events:none}
.toast.show{opacity:1}
h2{font-size:15px;font-weight:600;margin:16px 0 2px}
.warn{font-size:11.5px;color:#d98a1f;background:#241b0d;border:1px solid #3a2c12;border-radius:9px;padding:9px 11px;margin-top:10px;line-height:1.4;display:none}
.callout{background:linear-gradient(180deg,#13241d,#10181f);border:1px solid #234b3c;border-radius:13px;padding:13px 14px;margin-top:14px}
.callout .hd{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#7fd3b3;font-weight:700;margin-bottom:8px}
.callout .bar{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:13px}
.callout .lbl{width:108px;color:var(--muted);flex-shrink:0}
.callout .track{flex:1;height:8px;background:#0c1117;border-radius:5px;position:relative;overflow:hidden}
.callout .fill{position:absolute;top:0;bottom:0}
.callout .val{width:62px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.callout .live{margin-top:11px;padding-top:10px;border-top:1px solid #1f3a30;font-size:12.5px;color:var(--muted);line-height:1.5}
.callout .live b{color:var(--ink);font-weight:600}
.curve{margin-top:8px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px}
.curve svg{width:100%;height:auto;display:block}
.curve .cm{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-top:8px}
.flag{font-size:11px;font-weight:600;border-radius:7px;padding:5px 8px;margin-bottom:8px;line-height:1.35}
.flag.dup{color:#f0a0a0;background:#2a1414;border:1px solid #4a2020}
.flag.corr{color:#f0c178;background:#241b0d;border:1px solid #3a2c12}
.board{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.bnr{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 12px;text-align:center}
.bnr .bv{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;animation:flashv .7s ease-out}
.bnr .bl{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-top:6px}
.bnr.pos .bv{color:var(--take)} .bnr.neg .bv{color:var(--loss)} .bnr.neutral .bv{color:var(--ink)} .bnr.fade .bv{color:#b9a6ff}
.bnr.pos{animation:glowG 2.6s ease-in-out infinite}
.bnr.neg{animation:glowR 2.6s ease-in-out infinite}
.bnr.neutral{animation:glowN 2.6s ease-in-out infinite}
.bnr.fade{animation:glowF 2.6s ease-in-out infinite}
@keyframes glowG{0%,100%{box-shadow:0 0 0 0 rgba(29,158,117,0);border-color:var(--line)}50%{box-shadow:0 0 18px 0 rgba(29,158,117,.40);border-color:#23624c}}
@keyframes glowR{0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,0);border-color:var(--line)}50%{box-shadow:0 0 18px 0 rgba(226,75,74,.40);border-color:#5a2424}}
@keyframes glowN{0%,100%{box-shadow:0 0 0 0 rgba(120,128,140,0);border-color:var(--line)}50%{box-shadow:0 0 16px 0 rgba(120,128,140,.30);border-color:#3a4150}}
@keyframes glowF{0%,100%{box-shadow:0 0 0 0 rgba(139,108,255,0);border-color:var(--line)}50%{box-shadow:0 0 16px 0 rgba(139,108,255,.34);border-color:#3a3266}}
@keyframes flashv{0%{opacity:.25;transform:scale(1.18)}100%{opacity:1;transform:scale(1)}}
@media (prefers-reduced-motion:reduce){.bnr,.bnr .bv{animation:none!important}}
</style></head>

<header><div class="av">DS</div><div><h1>Bet tracker</h1><div class="sub" id="hdrsub">Paste &middot; grade &middot; analyze</div></div></header>

<!-- ADD VIEW -->
<div class="view on" id="v-add">
 <textarea id="in" placeholder="Paste David's Slack picks&#10;CUBS ML -108 5x&#10;CHC NYM o8.5 -105 5x&#10;Avalanche ML -130 10x"></textarea>
 <div class="row">
   <button class="btn" onclick="stage()">Parse</button>
   <button class="btn2" onclick="document.getElementById('in').value=''">Clear</button>
 </div>
 <div class="warn" id="warn"></div>
 <div class="summary" id="stagesum" style="display:none"></div>
 <div class="cards" id="staged"></div>

 </div>
</div>

<!-- LOG VIEW -->
<div class="view" id="v-log">
 <div class="summary" id="logsum"></div>
 <div class="note" id="lognote"></div>
 <div class="cards" id="log"></div>
</div>

<div class="view" id="v-trends">

 <div class="note" id="trnote"></div>
 <div class="callout" id="trcontrast"></div>

 <div class="curve" id="trcurve"></div>
 <h2>By sport <span style="font-weight:400;color:var(--muted);font-size:12px">(your graded bets)</span></h2>
 <div id="trsport"></div>
 <h2>Recommendation engine</h2>
 <div class="note" style="text-align:left;margin-top:4px" id="trengine"></div>
 <h2>Bankroll scoreboard</h2>
 <div class="board" id="trboard"></div>
 <div class="note" id="trboardnote"></div>
 <h2>Data</h2>
 <div class="exrow">
   <button class="btn2" onclick="copyBackup()">Copy backup</button>
   <button class="btn2" onclick="copyTracker()">Copy tracker rows</button>
   <button class="btn2" onclick="document.getElementById('restorebox').style.display='block'">Restore</button>
   <button class="btn2" onclick="wipe()" style="color:#e88">Erase all</button>
 </div>
 <div id="restorebox" style="display:none;margin-top:10px">
   <textarea id="restorein" placeholder="Paste a backup JSON here, then tap Restore"></textarea>
   <div class="row"><button class="btn2" onclick="doRestore()">Restore from JSON</button></div>
 </div>
</div>
</div>

<div class="nav">
 <button class="on" id="n-add" onclick="show('add')"><span class="ic">&#43;</span>Add</button>
 <button id="n-log" onclick="show('log')" style="position:relative"><span class="ic">&#9776;</span>Log<span class="badgeN" id="pendN" style="display:none"></span></button>
 <button id="n-trends" onclick="show('trends')"><span class="ic">&#9650;</span>Trends</button>
</div>

 const U=line.toUpperCase();
 let stake=null; const sm=U.match(/(\d+(?:\.\d+)?)\s*X\b/); if(sm)stake=parseFloat(sm[1]);
 let type='moneyline',lineVal=null,ou=null;
 if(/\bBTTS\b/.test(U)) type='prop';
 const ovm=U.match(/\b([OU])\s?(\d+(?:\.\d+)?)/);
 if(ovm){type='total';ou=ovm[1];lineVal=parseFloat(ovm[2]);}
 else if(/\bOVER\b/.test(U)){type='total';ou='O';} else if(/\bUNDER\b/.test(U)){type='total';ou='U';}
 const spm=U.match(/(?<![OU])([+-](?:\d+(?:\.\d+)?|\.\d+))/g); let odds=null;
 if(spm) for(const tk of spm){ const v=parseFloat(tk),isInt=!tk.includes('.');
   if(isInt&&Math.abs(v)>=100){ if(odds==null)odds=v; }
   else if(type==='moneyline'||type==='prop'){ if(Math.abs(v)<100||tk.includes('.')){type='spread';lineVal=v;} } }
 const toks=U.replace(/[+-]?\d+(?:\.\d+)?X?/g,' ').replace(/\b(ML|MONEYLINE|OVER|UNDER|BTTS|O|U|VS|V|AT|@)\b/g,' ')
   .split(/[\s\/,]+/).map(s=>s.replace(/[^A-Z']/g,'')).filter(s=>s.length>=2);
 const hasType=/\bML\b|MONEYLINE|BTTS|OVER|UNDER|\b[OU]\d/.test(U)||type==='spread'||type==='total'||type==='prop';
 if(stake==null&&odds==null&&!hasType) return null;
 const sport=detectSport(toks,type,lineVal,U), name=detectName(toks.length?toks:[U],line);
 let sel;
 if(type==='total') sel=name+' '+(ou==='U'?'under':'over')+(lineVal!=null?(' '+lineVal):'');
 else if(type==='spread') sel=name+' '+(lineVal>0?'+':'')+lineVal;
 else if(type==='prop') sel=name+' BTTS';
 else sel=name+' ML';
 return {raw:line,sport,type,lineVal,odds,stake,name,sel};
}

/* ---------- duplicate / correction detection ---------- */
function today(){ return new Date().toISOString().slice(0,10); }
function nmOf(x){ return (x.name||x.sel||'').toString().toLowerCase().replace(/\b(ml|over|under|btts)\b/g,'').replace(/[^a-z0-9]/g,''); }
function exSig(x){ return [(x.date||today()),x.sport,nmOf(x),x.type,x.lineVal,x.odds].join('|'); }
function gmSig(x){ return [(x.date||today()),x.sport,nmOf(x),x.type].join('|'); }

/* ---------- live grid + blended grading ---------- */
function liveGrid(){
 const g={};
 for(const b of bets){
   if(b.mode==='fade'||!(b.stake>0)) continue;
   if(!['WIN','LOSS','PUSH'].includes(b.result)) continue;
   const bk=bucket(b.dStake!=null?b.dStake:b.stake); if(!bk) continue;
   const k=b.sport+'|'+b.type+'|'+bk;
   (g[k]=g[k]||{u:0,st:0,w:0,l:0,p:0,n:0});
   g[k].u+=b.pl; g[k].st+=(b.risk!=null?b.risk:riskOf(b.stake,b.odds));
   if(b.result==='WIN')g[k].w++; else if(b.result==='LOSS')g[k].l++; else g[k].p++;
   if(b.result!=='PUSH')g[k].n++;
 }
 return g;
}
function gradeCell(sport,type,bkt){
 if(sport==='?'||!sport) return {tier:'pass',side:'tail',roi:null,n:0,reason:'pick a sport to grade'};
 const base=LK[sport]&&LK[sport][type]&&LK[sport][type][bkt];
 const fbase=LKF[sport]&&LKF[sport][type]&&LKF[sport][type][bkt];
 const lv=LIVE[sport+'|'+type+'|'+bkt];
 const baseN=(base&&base.roi!=null)?base.n:0, baseRoi=(base&&base.roi!=null)?base.roi:null;
 const liveN=lv?lv.n:0, liveRoi=(lv&&lv.st)?lv.u/lv.st*100:null;
 let n,droi;
 if(baseN&&liveN){ n=baseN+liveN; droi=(baseRoi*baseN+liveRoi*liveN)/n; }
 else if(baseN){ n=baseN; droi=baseRoi; }
 else if(liveN){ n=liveN; droi=liveRoi; }
 else return {tier:'pass',side:'tail',roi:null,n:0,reason:'no sample for this combo',live:lv};
 droi=Math.round(droi*10)/10;
 const froi=(fbase!=null)?fbase:null;
 let tier,side,roi,reason;
 if(droi>=8&&n>=30){tier='take';side='tail';roi=droi;reason='tail \u2014 he wins 8%+ here on a real sample';}
 else if(froi!=null&&froi>=8&&n>=30){tier='fade';side='fade';roi=froi;reason='fade \u2014 he loses enough that the other side clears the vig';}
 else if(droi>=8&&n>=12){tier='watch';side='tail';roi=droi;reason='tail edge but thin sample \u2014 watchlist';}
 else if(froi!=null&&froi>=8&&n>=12){tier='watch';side='fade';roi=froi;reason='fade edge but thin sample \u2014 watchlist';}
 else if(droi>0&&n>=30){tier='lean';side='tail';roi=droi;reason='slight tail edge, below the 8% bar';}
 else {tier='pass';side='tail';roi=droi;reason='neither side beats the juice \u2014 pass';}
 return {tier,side,roi,droi,froi,n,reason,live:lv,baseRoi,liveRoi,liveN};
}
let LIVE=liveGrid();
const TLAB={total:'Total (O/U)',moneyline:'Moneyline',spread:'Spread',prop:'Prop/BTTS'};
const TIER={take:'TAIL',fade:'FADE',watch:'WATCH',lean:'LEAN',pass:'PASS'};

/* ---------- staging (parse before filing) ---------- */
let staged=[];
function stage(){
 staged=document.getElementById('in').value.split('\n').map(parseLine).filter(Boolean);
 staged.forEach(p=>{ p.dStake=p.stake; p.myUnits=0; const bk=bucket(p.dStake); const g=bk?gradeCell(p.sport,p.type,bk):{side:'tail'}; p._side=(g.side==='fade')?'fade':'tail'; p._sideManual=false; p.fadeOdds=estFadeOdds(p.odds); });
 renderStaged();
}
function renderStaged(){
 const wrap=document.getElementById('staged'), sum=document.getElementById('stagesum'),
       frow=document.getElementById('filerow'), warn=document.getElementById('warn');
 if(!staged.length){ wrap.innerHTML=''; sum.style.display='none'; frow.style.display='none'; warn.style.display='none'; return; }
 staged.forEach((p,i)=>{ p._dup=false; p._corr=null; const pe=exSig(p),pg=gmSig(p);
   for(let j=0;j<i;j++){ if(exSig(staged[j])===pe)p._dup=true; else if(gmSig(staged[j])===pg&&!p._corr)p._corr='another pick in this slip'; }
   for(const b of bets){ if((b.date||today())!==today())continue; if(exSig(b)===pe)p._dup=true; else if(gmSig(b)===pg&&!p._corr)p._corr='a bet already filed today'; } });
 const c={take:0,fade:0,watch:0,lean:0,pass:0};
 const unk=staged.filter(p=>p.sport==='?').length;
 wrap.innerHTML=staged.map((p,i)=>{
   const bk=bucket(p.dStake), g=bk?gradeCell(p.sport,p.type,bk):{tier:'pass',side:'tail',roi:null,droi:null,froi:null,n:0,reason:'no stake found'};
   c[g.tier]++;
   return cardHTML(p,i,g,bk,'stage');
 }).join('');
 sum.style.display='flex';
 sum.innerHTML=[['take','Tail'],['fade','Fade'],['watch','Watch'],['lean','Lean'],['pass','Pass']].map(([k,l])=>
   `<div class="pill"><div class="num" style="color:var(--${k})">${c[k]}</div><div class="lab">${l}</div></div>`).join('');
 frow.style.display='flex';
 warn.style.display = unk? 'block':'none';
 if(unk) warn.innerHTML=`${unk} pick(s) need a sport \u2014 the team wasn't recognized. Tap <b>Pick sport\u2026</b> on those cards before filing.`;
}
function oppSel(p){
 if(p.type==='total'){ const m=/(over|under)\s*([\d.]+)/i.exec(p.sel||''); if(m) return (m[1].toLowerCase()==='over'?'Under':'Over')+' '+m[2]; return 'opposite total'; }
 if(p.type==='spread'){ return 'other side'+(p.lineVal!=null?` (${(-p.lineVal)>=0?'+':''}${-p.lineVal})`:''); }
 return 'the other side / dog'; }
function setSide(i,s){ const p=staged[i]; p._side=s; p._sideManual=true; if(s==='fade'&&p.fadeOdds==null)p.fadeOdds=estFadeOdds(p.odds); renderStaged(); }
function cardHTML(p,i,g,bk,mode){

 const liveTxt=g.liveN?` \u00b7 <b>your ${g.live.w}-${g.live.l}${g.live.p?'-'+g.live.p:''}</b>, ${g.live.u>=0?'+':''}${g.live.u.toFixed(1)}u`:'';

 const flags=`${p._dup?'<div class="flag dup">Duplicate \u2014 already filed today; will be skipped on filing</div>':''}${p._corr?`<div class="flag corr">Possible correction of ${p._corr} \u2014 same team/market, different line or odds</div>`:''}`;

     <span class="tag" style="border-color:#2f6b54;color:#8fe6c8">Mine <input class="uin" type="number" inputmode="decimal" min="0" step="0.5" value="${p.myUnits>0?p.myUnits:''}" placeholder="0" onchange="ov_${mode}(${i},'mystake',this.value)">u</span></div>
   <div class="meta"><span class="sidetog"><button class="${p._side==='tail'?'on':''}" onclick="setSide(${i},'tail')">Tail</button><button class="${p._side==='fade'?'on f':''}" onclick="setSide(${i},'fade')">Fade</button></span>${p._side==='fade'?`<span class="tag" style="color:#c3b0ff">→ ${oppSel(p)} @ <input class="uin" type="number" inputmode="numeric" value="${p.fadeOdds!=null?p.fadeOdds:''}" onchange="ov_${mode}(${i},'fadeodds',this.value)" style="width:56px"></span>`:''}</div>
   <div class="why"><b>${p.sport} ${TLAB[p.type].toLowerCase()} @ ${bk||'?'}:</b> ${g.reason}. <b>tail ${g.droi!=null?(g.droi>=0?'+':'')+g.droi+'%':'—'}</b> · fade ${g.froi!=null?(g.froi>=0?'+':'')+g.froi+'%':'—'} (n=${g.n})${g.liveN?` · your ${g.live.w}-${g.live.l}`:''}.${p.myUnits>0?(p._side==='fade'?` You'd bet <b style="color:#c3b0ff">${oppSel(p)}</b>, risk <b>${riskOf(p.myUnits,p.fadeOdds)}u</b> to win <b>${p.myUnits}u</b>.`:` Risk <b>${riskOf(p.myUnits,p.odds)}u</b> to win <b>${p.myUnits}u</b>.`):` <i style="color:var(--muted)">Enter your units in "Mine" to take it.</i>`}</div>
 </div>`;
}
function ov_stage(i,f,v){ const p=staged[i];
 if(f==='sport')p.sport=v; else if(f==='dstake')p.dStake=(parseFloat(v)||null);
 else if(f==='mystake')p.myUnits=(parseFloat(v)||0); else if(f==='fadeodds')p.fadeOdds=(parseInt(v)||null);
 if(f==='sport'||f==='dstake'){ if(!p._sideManual){ const bk=bucket(p.dStake); const g=bk?gradeCell(p.sport,p.type,bk):{side:'tail'}; p._side=(g.side==='fade')?'fade':'tail'; } if(p.odds!=null&&p.fadeOdds==null)p.fadeOdds=estFadeOdds(p.odds); }
 renderStaged(); }
function fileStaged(){
 const d=today(); const toFile=staged.filter(p=>!p._dup); const dups=staged.filter(p=>p._dup).length;
 if(!toFile.length){ toast(dups?'All picks already filed today':'Nothing to file'); return; }
 let nbet=0,ntrk=0;
 toFile.forEach(p=>{ const fade=p._side==='fade'; const od=fade?(p.fadeOdds!=null?p.fadeOdds:p.odds):p.odds;
   const myU=(p.myUnits>0)?p.myUnits:0; const trk=!(myU>0); if(trk)ntrk++; else nbet++;
   bets.push({id:Date.now()+''+Math.random().toString(36).slice(2,6),date:d,
   sport:p.sport,type:p.type,lineVal:p.lineVal,odds:od,dStake:p.dStake,name:p.name,mode:fade?'fade':'tail',
   stake:myU,risk:riskOf(myU,od),sel:(fade?('Fade: '+p.sel+' \u2192 '+oppSel(p)):p.sel),raw:p.raw,result:trk?'TRACKED':'PENDING',pl:null}); });
 save(); staged=[]; document.getElementById('in').value=''; renderStaged();
 LIVE=liveGrid(); toast(`Filed ${nbet} bet${nbet===1?'':'s'}${ntrk?` \u00b7 ${ntrk} tracked`:''}${dups?` \u00b7 ${dups} dup`:''}`); show('log');
}

/* ---------- log + grading ---------- */
function setResult(id,res){
 const b=bets.find(x=>x.id===id); if(!b)return;
 b.result = b.result===res?'PENDING':res;
 b.risk=riskOf(b.stake,b.odds);
 if(b.result==='WIN') b.pl=+(+b.stake).toFixed(2);
 else if(b.result==='LOSS') b.pl=+(-(b.risk!=null?b.risk:b.stake)).toFixed(2);
 else if(b.result==='PUSH') b.pl=0; else b.pl=null;
 save(); LIVE=liveGrid(); renderLog(); renderTrends(); updateNav();
}
function delBet(id){ bets=bets.filter(x=>x.id!==id); save(); LIVE=liveGrid(); renderLog(); renderTrends(); updateNav(); }
function setBetSport(id,v){ const b=bets.find(x=>x.id===id); if(b){ b.sport=v; save(); LIVE=liveGrid(); renderLog(); renderTrends(); } }

     const sib=gmCount[gmSig(b)]>1?`<div class="flag corr">\u26a0 Another play on this team/market today \u2014 possible duplicate or correction. Delete the stale one.</div>`:'';

/* ---------- trends ---------- */

   `<table class="tr"><tr><th>Sport</th><th>Rec</th><th style="text-align:right">Units</th><th style="text-align:right">ROI</th></tr>`+
   rows.map(([s,o])=>{const r=o.st?o.u/o.st*100:0;return `<tr><td>${s}</td><td>${o.w}-${o.l}${o.p?'-'+o.p:''}</td>
     <td style="text-align:right" class="${o.u>=0?'pos':'neg'}">${o.u>=0?'+':''}${o.u.toFixed(1)}</td>
     <td style="text-align:right" class="${r>=0?'pos':'neg'}">${r>=0?'+':''}${r.toFixed(1)}%</td></tr>`}).join('')+`</table>`
   : `<div class="empty">No graded bets yet.</div>`;
 // engine status: which cells your data has shifted
 const moved=[];
 for(const k in LIVE){ const [sp,ty,bk]=k.split('|'); const lv=LIVE[k]; if(lv.n<2)continue;
   const base=LK[sp]&&LK[sp][ty]&&LK[sp][ty][bk]; const br=base&&base.roi!=null?base.roi:null;
   const g=gradeCell(sp,ty,bk);
   moved.push(`<b>${sp} ${ty} ${bk}</b>: ${br!=null?`his ${br>0?'+':''}${br}%`:'no baseline'} \u2192 blended ${g.roi>0?'+':''}${g.roi}% &rarr; <b style="color:var(--${g.tier})">${TIER[g.tier]}</b> (your ${lv.w}-${lv.l}${lv.p?'-'+lv.p:''})`); }
 document.getElementById('trengine').innerHTML = moved.length?
   `Cells your results are now influencing:<br>&bull; `+moved.join('<br>&bull; ')
   : `Grades currently run on David's 2026 baseline. As you log results, those cells blend toward your own numbers and will show here.`;
}

/* ---------- export / restore ---------- */
function copyText(txt,msg){
 if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(()=>toast(msg)).catch(()=>fallbackCopy(txt,msg)); }
 else fallbackCopy(txt,msg);
}
function fallbackCopy(txt,msg){
 const ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.top='0'; ta.style.opacity='0';
 document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0,txt.length);
 let ok=false; try{ ok=document.execCommand('copy'); }catch(e){}
 document.body.removeChild(ta);
 if(ok){ toast(msg); } else { document.getElementById('restorebox').style.display='block'; document.getElementById('restorein').value=txt; toast('Copy blocked \u2014 text is in the box below'); }
}
function copyBackup(){ copyText(JSON.stringify(bets),'Backup copied'); }
function copyTracker(){
 const hdr=['Date','Sport / League','Selection','Stake','Odds','Decimal','Result','Net Profit'];
 const lines=[hdr.join('\t')].concat(bets.map(b=>[b.date,b.sport,b.sel,b.stake,b.odds,b.odds!=null?amToDec(b.odds):'',b.result,b.pl??''].join('\t')));
 copyText(lines.join('\n'),'Tracker rows copied \u2014 paste into Excel');
}
function doRestore(){ try{ const d=JSON.parse(document.getElementById('restorein').value); if(Array.isArray(d)){ bets=d; save(); LIVE=liveGrid(); document.getElementById('restorebox').style.display='none'; renderAll(); toast('Restored '+d.length+' bets'); } }catch(e){ toast('Invalid JSON'); } }
function wipe(){ if(confirm('Erase ALL tracked bets? This cannot be undone.')){ bets=[]; save(); LIVE=liveGrid(); renderAll(); toast('Erased'); } }

/* ---------- nav ---------- */
function show(v){
 ['add','log','trends'].forEach(x=>{ document.getElementById('v-'+x).classList.toggle('on',x===v);
   document.getElementById('n-'+x).classList.toggle('on',x===v); });
 if(v==='log')renderLog(); if(v==='trends')renderTrends();
}
function updateNav(){
 const pend=bets.filter(b=>b.stake>0 && b.result==='PENDING').length;
 const el=document.getElementById('pendN'); el.style.display=pend?'block':'none'; el.textContent=pend;
}
function renderAll(){ renderStaged(); renderLog(); renderTrends(); updateNav(); }
renderAll();
</script>
